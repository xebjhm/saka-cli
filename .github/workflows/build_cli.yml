name: Build CLI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    permissions:
      contents: write

    steps:
      - name: Checkout PyHakoCLI
        uses: actions/checkout@v4
        with:
          path: PyHakoCLI

      - name: Checkout PyHako Core
        uses: actions/checkout@v4
        with:
          repository: xebjhm/PyHako
          path: PyHako

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        working-directory: PyHakoCLI
        run: uv sync

      - name: Build with PyInstaller
        working-directory: PyHakoCLI
        run: uv run pyinstaller build.spec

      - name: Smoke Test Binary
        working-directory: PyHakoCLI
        shell: bash
        run: |
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            ./dist/pyhako-cli.exe --help
          else
            chmod +x ./dist/pyhako-cli
            ./dist/pyhako-cli --help
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pyhako-cli-${{ matrix.os }}
          path: PyHakoCLI/dist/pyhako-cli*

      - name: Publish Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: PyHakoCLI/dist/pyhako-cli*
