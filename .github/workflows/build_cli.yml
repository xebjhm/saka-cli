name: Build CLI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies (using PyPI pysaka)
        run: uv sync --no-sources

      - name: Build with PyInstaller
        run: uv run --no-sources pyinstaller build.spec

      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION=$(grep -Po '(?<=^version = ")[^"]*' pyproject.toml)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Smoke Test Binary
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" == "windows" ]; then
            ./dist/saka-cli-${{ steps.version.outputs.version }}-windows.exe --help
          else
            chmod +x ./dist/saka-cli-${{ steps.version.outputs.version }}-linux
            ./dist/saka-cli-${{ steps.version.outputs.version }}-linux --help
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: saka-cli-${{ steps.version.outputs.version }}-${{ matrix.platform }}
          path: dist/saka-cli-*

      - name: Publish Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/saka-cli-*
